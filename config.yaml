experiment:
  name: baseline_cnn
  output_dir: artifacts
  runs_per_variant: 5
  max_workers: 4
  base_seed: 1337
  metrics:
    - accuracy
    - f1
ablations:
  optimizer: [adam, sgd]
  lr: [0.001, 0.01]
  dropout: [0.1, 0.3]
research:
  min_sources: 3
  query_topics:
    - "peer-reviewed ablation study methodology"
    - "bootstrap significance testing machine learning"
    - "reproducibility standards computational science"
